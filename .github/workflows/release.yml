name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: windows-latest
            target: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install

      # Linux-specific dependencies
      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Wither Launcher ${{ github.ref_name }}'
          releaseBody: |
            ## Wither Launcher ${{ github.ref_name }}
            
            ### Downloads
            - **Linux**: `.deb` (Debian/Ubuntu) or `.AppImage` (universal)
            - **Windows**: `.exe` (NSIS installer)
            
            ### Installation
            **Linux AppImage**: `chmod +x Wither_*.AppImage && ./Wither_*.AppImage`
            **Linux .deb**: `sudo dpkg -i wither_*.deb`
            **Windows**: Run the `.exe` installer
          releaseDraft: false
          prerelease: false
